name: Daily Clover Sync

on:
  schedule:
    # Runs at 11:00 AM UTC daily (adjust for your timezone)
    # For EST (UTC-5): 11 AM EST = 4 PM UTC = '0 16 * * *'
    # For PST (UTC-8): 11 AM PST = 7 PM UTC = '0 19 * * *'
    # For CST (UTC-6): 11 AM CST = 5 PM UTC = '0 17 * * *'
    - cron: "0 16 * * *" # This is 11 AM EST, change as needed

  # Allows manual triggering from GitHub UI
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Kill job if it takes longer than 15 minutes

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔄 Run Clover sync
        env:
          ZOHO_REFRESH_TOKEN: ${{ secrets.ZOHO_REFRESH_TOKEN }}
          ZOHO_CLIENT_ID: ${{ secrets.ZOHO_CLIENT_ID }}
          ZOHO_CLIENT_SECRET: ${{ secrets.ZOHO_CLIENT_SECRET }}
        run: |
          echo "🚀 Starting Clover sync at $(date)"
          node clover-sync.js
          echo "✅ Sync completed at $(date)"

      - name: 📄 Save logs and data files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-results-${{ github.run_number }}
          path: |
            *.json
            *.log
          retention-days: 7
